<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body class="bg-light">

<div class="container mt-5">

<div class="card p-4 shadow">

    <div class="text-center mb-4">
    <h1>⚙️ Admin Dashboard</h1>
    <p class="text-muted">
        Manage Users and System Activity
    </p>
</div>

<hr>
<div class="row mb-4">

        <div class="col-md-4">
        <div class="card text-center p-3">
            <h5>Total Users</h5>
            <h2>👥</h2>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card text-center p-3">
            <h5>Security</h5>
            <h2>🔐</h2>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card text-center p-3">
            <h5>Status</h5>
            <h2>✅</h2>
        </div>
    </div>
    
    <div class="col-md-4">
        <div class="card text-center p-3 shadow-sm">
            <h5>Total Users</h5>
            <h2>{{ users|length }}</h2>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card text-center p-3 shadow-sm">
            <h5>Admin Users</h5>
            <h2>1</h2>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card text-center p-3 shadow-sm">
            <h5>System Status</h5>
            <h2>🟢</h2>
        </div>
    </div>

</div>

<form method="GET">
    <input type="text"
           name="search"
           class="form-control mb-3"
           placeholder="🔍 Search User">

    <button class="btn btn-primary mb-3">
    🔍 Search
</button>
</form>

<table class="table table-hover table-striped">

<tr>
    <th>ID</th>
<th>Username</th>
<th>Action</th>
</tr>

{% for user in users %}
<tr>
    <td>{{ user.id }}</td>
    <td>{{ user.username }}</td>

    <td>
        <a href="/delete_user/{{ user.id }}"
           class="btn btn-danger btn-sm">
           🗑 Delete
        </a>
    </td>
</tr>
{% endfor %}

</table>

<a href="/dashboard" class="btn btn-dark">
    🏠 Dashboard
</a>

</div>

</div>

</body>
</html>
